<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Fourci | E-Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #3b82f6; 
        }

        /* Container utama untuk menahan posisi */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh; /* Menggunakan viewport height agar pas di Android */
            overflow: hidden;
        }

        iframe {
            position: absolute;
            /* Membuang banner biru Google */
            top: -45px; 
            left: 0;
            width: 100%;
            /* Trik: Jangan ditambah 45px terlalu banyak agar bawahnya tidak tenggelam */
            height: calc(100% + 45px); 
            border: none;
            
            /* Bantalan atas agar header tidak kepotong */
            padding-top: 40px; 

            /* JURUS ANTI TENGGELAM BAWAH: 
               Kita beri margin bawah negatif atau padding agar konten 
               terdorong naik sedikit di layar Android */
            padding-bottom: 60px; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbwk4fPEOUYSX-x1dv2GZdPxepKWsEzgmjqoaYzyF4D7ARer_wZvksGShnRN5MepmDLr/exec"></iframe>
    </div>
</body>
</html>
