<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Fourci | E-Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Mengatur dasar halaman jadi Putih Bersih */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #FFFFFF; /* Putih Susu */
        }

        .wrapper { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            overflow: hidden; 
        }

        iframe {
            position: absolute;
            top: -45px; 
            left: 0; 
            width: 100%; 
            height: calc(100% + 45px); 
            border: none;
            padding-top: 15px; 
            padding-bottom: 70px; 
            box-sizing: border-box;
            /* Pastikan background iframe juga putih agar serasi */
            background-color: #FFFFFF; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe id="myIframe" src="" allowtransparency="true"></iframe>
    </div>

    <script>
        const queryString = window.location.search;
        const baseUrl = "https://script.google.com/macros/s/AKfycbwk4fPEOUYSX-x1dv2GZdPxepKWsEzgmjqoaYzyF4D7ARer_wZvksGShnRN5MepmDLr/exec";
        document.getElementById('myIframe').src = baseUrl + queryString;
    </script>
</body>
</html>
