<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Fourci | E-Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Mengatur dasar halaman */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            /* Warna biru ini disesuaikan dengan header warehouse Kakak */
            background-color: #3b82f6; 
        }

        /* Membungkus Apps Script */
        iframe {
            position: absolute;
            /* Angka -45px ini yang memotong banner biru Google */
            top: -45px; 
            left: 0;
            width: 100%;
            /* Tinggi layar ditambah 45px untuk kompensasi tarikan ke atas */
            height: calc(100% + 45px);
            border: none;
            
            /* JURUS RAHASIA: Memberi bantalan sedikit agar konten Warehouse 
               tidak tenggelam meskipun banner Google-nya kita potong */
            padding-top: 40px; 
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbwk4fPEOUYSX-x1dv2GZdPxepKWsEzgmjqoaYzyF4D7ARer_wZvksGShnRN5MepmDLr/exec"></iframe>
</body>
</html>
